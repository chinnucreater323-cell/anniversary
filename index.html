<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mom ❤️ Dad</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
overflow:hidden;
color:white;
}

.screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100vh;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
animation:fade 1s;
}

.active{
display:flex;
}

button{
padding:16px 35px;
border:none;
border-radius:20px;
background:white;
font-size:1rem;
font-weight:bold;
cursor:pointer;
margin-top:25px;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

.memoryImage{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
top:0;
left:0;
z-index:-3;
animation:zoom 10s linear forwards;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
top:0;
left:0;
z-index:-2;
}

.centerText{
text-align:center;
padding:30px;
max-width:900px;
animation:float 4s infinite ease-in-out;
z-index:10;
}

.centerText h1{
font-size:5rem;
margin-bottom:20px;
}

.centerText p{
font-size:1.5rem;
line-height:1.7;
}

.bottomCaption{
position:absolute;
bottom:80px;
font-size:2rem;
padding:20px;
text-align:center;
animation:fadeUp 2s;
z-index:5;
}

input{
padding:16px;
width:320px;
border:none;
border-radius:15px;
font-size:1rem;
margin-top:20px;
text-align:center;
}

#result{
margin-top:20px;
font-size:1.4rem;
}

.memoryCounter{
position:absolute;
top:25px;
right:30px;
font-size:1rem;
opacity:0.7;
z-index:10;
}

.floating{
position:absolute;
color:pink;
animation:rise 6s linear infinite;
opacity:0.5;
}

.finalPhoto{
width:260px;
height:260px;
object-fit:cover;
border-radius:50%;
margin-top:30px;
border:5px solid white;
box-shadow:0 0 40px pink;
animation:float 4s infinite ease-in-out;
}

@keyframes rise{
from{
transform:translateY(100vh);
opacity:0;
}
to{
transform:translateY(-120vh);
opacity:1;
}
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

@keyframes zoom{
from{
transform:scale(1);
}
to{
transform:scale(1.08);
}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0px);
}
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

</style>
</head>

<body>

<!-- INTRO -->

<div class="screen active" id="intro">

<div class="centerText">

<h1 id="title"></h1>

<p id="introText"></p>

<button onclick="nextScreen('wedding')">
Begin Story →
</button>

</div>

</div>

<!-- WEDDING -->

<div class="screen" id="wedding">

<img
src="https://i.ibb.co/cGQLjtT/wedding-jpg.png"
class="memoryImage"
>

<div class="overlay"></div>

<div class="bottomCaption">

The day everything began 💍

<br>

<button onclick="nextScreen('choose')">
Continue →
</button>

</div>

</div>

<!-- CHOOSE -->

<div class="screen" id="choose">

<div class="centerText">

<h1>Who is watching this memory? 👀</h1>

<button onclick="startQuiz('dad')">
THIRUPATHI
</button>

<button onclick="startQuiz('mom')">
AURNA
</button>

</div>

</div>

<!-- QUIZ -->

<div class="screen" id="quiz">

<div class="centerText">

<h1 id="quizTitle"></h1>

<p id="question"></p>

<input
type="text"
id="answerInput"
placeholder="Type your answer..."
>

<button onclick="submitAnswer()">
Check Answer →
</button>

<button onclick="openVault()">
Skip Quiz →
</button>

<div id="result"></div>

</div>

</div>

<!-- MEMORY VAULT -->

<div class="screen" id="vault">

<img
id="memoryImage"
class="memoryImage"
src="https://i.ibb.co/3yDmTZ0q/home-jpg.jpg"
>

<div class="overlay"></div>

<div class="memoryCounter"
id="counter">
</div>

<div class="bottomCaption">

<div id="caption"></div>

<button onclick="nextMemory()">
Next Memory →
</button>

</div>

</div>

<!-- END -->

<div class="screen" id="end">

<div class="centerText">

<h1>❤️</h1>

<p>

Years passed...<br>
but love stayed forever.

<br><br>

Thanks from Chinnu ❤️<br>
for giving this wonderful family 😭

<br><br>

Made with love by brothers ❤️<br>
Mainly by Chinnu.

</p>

<img
class="finalPhoto"
src="https://i.ibb.co/zhXPhPhh/IMG-20220614-201406.jpg"
>

</div>

</div>

<script>

function typeText(
element,
text,
speed=40
){

let i=0;

element.innerHTML="";

const typing=setInterval(()=>{

element.innerHTML +=
text.charAt(i);

i++;

if(i>=text.length){
clearInterval(typing);
}

},speed);

}

typeText(
document.getElementById("title"),
"Mom ❤️ Dad",
90
);

setTimeout(()=>{

typeText(
document.getElementById("introText"),
"Some stories never fade... This is one of them.",
40
);

},1000);

function nextScreen(id){

document
.querySelectorAll(".screen")
.forEach(screen=>{

screen.classList.remove("active");

});

document
.getElementById(id)
.classList.add("active");

}


// QUIZ

const quizData={

dad:[

{
question:
"What is Mom's favorite colour?",

answer:"violet"
},

{
question:
"What is Mom's favorite animal?",

answer:"elephant"
},

{
question:
"What is Mom's favorite bird?",

answer:"parrot"
},

{
question:
"What is Mom's favorite Tollywood hero?",

answer:"uday kiran"
}

],

mom:[

{
question:
"What is Dad's favorite colour?",

answer:"black"
},

{
question:
"What is Dad's favorite animal?",

answer:"lion"
},

{
question:
"What is Dad's favorite food?",

answer:"biryani"
},

{
question:
"What is Dad's favorite hero?",

answer:"chiranjeevi"
}

]

};

let currentPerson="";
let currentQuestion=0;
let score=0;

function startQuiz(person){

currentPerson=person;

currentQuestion=0;

score=0;

nextScreen("quiz");

document
.getElementById("quizTitle")
.innerHTML=

person==="dad"

?

"Quiz For Thirupathi ❤️"

:

"Quiz For Aurna ❤️";

loadQuestion();

}

function loadQuestion(){

const q=
quizData[currentPerson]
[currentQuestion];

document
.getElementById("question")
.innerHTML=q.question;

document
.getElementById("answerInput")
.value="";

document
.getElementById("result")
.innerHTML="";

}

function submitAnswer(){

const input=

document
.getElementById("answerInput")
.value
.toLowerCase()
.trim();

const correct=

quizData[currentPerson]
[currentQuestion]
.answer;


// AURNA QUIZ

if(currentPerson==="mom"){

document
.getElementById("result")
.innerHTML=

`
Give the phone to your husband 👀❤️

<br><br>

Was this answer correct? 😭

<br><br>

<button onclick="husbandCheck(true)">
YES ❤️
</button>

<button onclick="husbandCheck(false)">
NO 😭
</button>
`;

return;

}


// THIRUPATHI QUIZ

if(input===correct){

score++;

document
.getElementById("result")
.innerHTML=
"Correct 😭❤️";

document
.getElementById("result")
.style.color=
"lightgreen";

}else{

document
.getElementById("result")
.innerHTML=
"Wrong 😭";

document
.getElementById("result")
.style.color=
"red";

}

currentQuestion++;

if(
currentQuestion <
quizData[currentPerson]
.length
){

setTimeout(()=>{

loadQuestion();

},1500);

}else{

setTimeout(()=>{

showReport();

},1500);

}

}


function husbandCheck(correct){

if(correct){

score++;

}

currentQuestion++;

if(
currentQuestion <
quizData[currentPerson]
.length
){

loadQuestion();

}else{

showReport();

}

}


// REPORT CARD

function showReport(){

let total=
quizData[currentPerson]
.length;

let message="";

if(score===total){

message=
"Perfect Match 😭❤️";

}else if(score>=2){

message=
"Very Good Couple Energy ❤️";

}else{

message=
"Need More Husband-Wife Meetings 😭";

}

document
.getElementById("quiz")
.innerHTML=`

<div class="centerText">

<h1>Quiz Report Card 📜</h1>

<p>

Score: ${score} / ${total}

<br><br>

${message}

<br><br>

Love still wins ❤️

</p>

<button onclick="openVault()">

Open Memory Vault 🔐

</button>

</div>

`;

}


// MEMORIES

const memories=[

{
image:
"https://i.ibb.co/3yDmTZ0q/home-jpg.jpg",

caption:
"Home was never a place... it was them. 🏠"
},

{
image:
"https://i.ibb.co/60dgkCXD/function-jpg.jpg",

caption:
"Still side by side through every celebration ✨"
},

{
image:
"https://i.ibb.co/8gKjdy1d/temple1-jpg.jpg",

caption:
"Some prayers were answered long ago 🛕"
},

{
image:
"https://i.ibb.co/wrbPHDyV/temple2-jpg.jpg",

caption:
"Together... through every journey ❤️"
}

];

let currentMemory=0;

function openVault(){

nextScreen("vault");

showMemory();

}

function showMemory(){

const memory=
memories[currentMemory];

const img=
document.getElementById("memoryImage");

img.src=
memory.image;

document
.getElementById("caption")
.innerHTML=
memory.caption;

document
.getElementById("counter")
.innerHTML=

(currentMemory+1)

+

" / "

+

memories.length;

}

function nextMemory(){

currentMemory++;

if(
currentMemory>=
memories.length
){

nextScreen("end");

return;

}

showMemory();

}


// FLOATING HEARTS

setInterval(()=>{

const heart=
document.createElement("div");

heart.classList.add("floating");

heart.innerHTML="❤️";

heart.style.left=
Math.random()*100+"vw";

heart.style.fontSize=
Math.random()*30+20+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},6000);

},350);

</script>

</body>
</html>
